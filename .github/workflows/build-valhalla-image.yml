name: Build valhalla Image

on:
  push:
    branches: [master, development, test, staging]
    paths:
      - 'src/**'
      - 'proto/**'
      - 'valhalla/**'
      - 'cmake/**'
      - 'third_party/**'
      - 'CMakeLists.txt'
      - 'libvalhalla.pc.in'
      - 'docker/Dockerfile.prod'
      - 'config/**'
      - 'deploy/**'
      - '.github/workflows/build-valhalla-image.yml'
  workflow_dispatch:

concurrency:
  group: build-valhalla-${{ github.ref }}
  cancel-in-progress: true

env:
  ECR_ACCOUNT_ID: "633107344074"
  ECR_REGISTRY: 633107344074.dkr.ecr.ap-southeast-1.amazonaws.com
  ECR_REPOSITORY: valhalla
  AWS_REGION: ap-southeast-1

jobs:
  # ── Compute tags once, share across jobs ──────────────────────────────────
  prepare:
    runs-on: mvlchain-runner-large
    outputs:
      branch:     ${{ steps.tags.outputs.branch }}
      short_sha:  ${{ steps.tags.outputs.short_sha }}
      image_base: ${{ steps.tags.outputs.image_base }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine image tags
        id: tags
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          BRANCH=$(echo "${GITHUB_REF_NAME}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          IMAGE_BASE="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}"

          echo "short_sha=${SHORT_SHA}"     >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}"           >> "$GITHUB_OUTPUT"
          echo "image_base=${IMAGE_BASE}"   >> "$GITHUB_OUTPUT"

  # ── Build and push final tags directly ───────────────────────────────────
  build:
    needs: prepare
    runs-on: mvlchain-runner-large

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: ${{ env.ECR_ACCOUNT_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.prod
          platforms: linux/amd64
          push: true
          tags: |
            ${{ needs.prepare.outputs.image_base }}:${{ needs.prepare.outputs.branch }}-latest
            ${{ needs.prepare.outputs.image_base }}:${{ needs.prepare.outputs.branch }}-${{ needs.prepare.outputs.short_sha }}
          cache-from: type=gha,scope=valhalla-amd64
          cache-to:   type=gha,mode=max,scope=valhalla-amd64
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.ref.name=${{ needs.prepare.outputs.branch }}

  # ── Verify and summarise ─────────────────────────────────────────────────
  verify:
    needs: [prepare, build]
    runs-on: mvlchain-runner-large
    steps:
      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: ${{ env.ECR_ACCOUNT_ID }}

      - name: Verify image — JAR and native libs present
        run: |
          IMAGE="${{ needs.prepare.outputs.image_base }}:${{ needs.prepare.outputs.branch }}-${{ needs.prepare.outputs.short_sha }}"
          docker pull "${IMAGE}"

          echo "--- Verifying JAR exists and checking size ---"
          JAR_SIZE=$(docker run --rm "${IMAGE}" sh -c "ls -lh /app/valhalla-jni.jar")
          echo "${JAR_SIZE}"
          SIZE_BYTES=$(docker run --rm "${IMAGE}" sh -c "stat -c%s /app/valhalla-jni.jar")
          if [ "${SIZE_BYTES}" -lt 1048576 ]; then
            echo "❌ JAR is suspiciously small (${SIZE_BYTES} bytes) — build may have failed" && exit 1
          fi
          echo "✅ JAR size OK: ${SIZE_BYTES} bytes"

          echo "--- Verifying native libs bundled in JAR ---"
          docker run --rm "${IMAGE}" sh -c "unzip -l /app/valhalla-jni.jar | grep '\.so'"

      - name: Summary
        run: |
          echo "## Valhalla Image Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | \`${{ needs.prepare.outputs.branch }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ needs.prepare.outputs.short_sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Registry | \`${{ env.ECR_REGISTRY }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Repository | \`${{ env.ECR_REPOSITORY }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dockerfile | \`docker/Dockerfile.prod\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Tags pushed:**" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ needs.prepare.outputs.image_base }}:${{ needs.prepare.outputs.branch }}-latest" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ needs.prepare.outputs.image_base }}:${{ needs.prepare.outputs.branch }}-${{ needs.prepare.outputs.short_sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**To use this image for JNI JAR extraction:**" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`bash" >> "$GITHUB_STEP_SUMMARY"
          echo "docker run --rm -v \$(pwd)/output:/out \\" >> "$GITHUB_STEP_SUMMARY"
          echo "  ${{ needs.prepare.outputs.image_base }}:${{ needs.prepare.outputs.branch }}-${{ needs.prepare.outputs.short_sha }} \\" >> "$GITHUB_STEP_SUMMARY"
          echo "  sh -c 'cp /app/valhalla-jni.jar /out/'" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**To use this image for tile building:**" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`bash" >> "$GITHUB_STEP_SUMMARY"
          echo "VALHALLA_DOCKER_IMAGE=${{ needs.prepare.outputs.image_base }}:${{ needs.prepare.outputs.branch }}-${{ needs.prepare.outputs.short_sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
