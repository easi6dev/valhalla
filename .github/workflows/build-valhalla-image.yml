name: Build valhalla Image

on:
  push:
    branches: [master, development, test, staging]
    paths:
      - 'src/**'
      - 'proto/**'
      - 'valhalla/**'
      - 'cmake/**'
      - 'third_party/**'
      - 'CMakeLists.txt'
      - 'libvalhalla.pc.in'
      - 'docker/Dockerfile.prod'
      - 'config/**'
      - '.github/workflows/build-valhalla-image.yml'
  workflow_dispatch:
    inputs:
      push_latest:
        description: 'Also tag and push as :latest'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

concurrency:
  group: build-valhalla-${{ github.ref }}
  cancel-in-progress: true

env:
  ECR_ACCOUNT_ID: "633107344074"
  ECR_REGISTRY: 633107344074.dkr.ecr.ap-southeast-1.amazonaws.com
  ECR_REPOSITORY: valhalla
  AWS_REGION: ap-southeast-1

jobs:
  # ── Compute tags once, share across jobs ──────────────────────────────────
  prepare:
    runs-on: mvlchain-runner-large
    outputs:
      tag_sha:    ${{ steps.tags.outputs.tag_sha }}
      tag_branch: ${{ steps.tags.outputs.tag_branch }}
      tags:       ${{ steps.tags.outputs.tags }}
      branch:     ${{ steps.tags.outputs.branch }}
      short_sha:  ${{ steps.tags.outputs.short_sha }}
      image_base: ${{ steps.tags.outputs.image_base }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine image tags
        id: tags
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          BRANCH=$(echo "${GITHUB_REF_NAME}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          IMAGE_BASE="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}"

          TAG_SHA="${IMAGE_BASE}:${BRANCH}-${SHORT_SHA}"
          TAG_BRANCH="${IMAGE_BASE}:${BRANCH}"
          TAGS="${TAG_SHA},${TAG_BRANCH}"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.push_latest }}" == "true" ]]; then
            TAGS="${TAGS},${IMAGE_BASE}:latest"
          fi

          echo "tags=${TAGS}"               >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}"     >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}"           >> "$GITHUB_OUTPUT"
          echo "image_base=${IMAGE_BASE}"   >> "$GITHUB_OUTPUT"
          echo "tag_sha=${TAG_SHA}"         >> "$GITHUB_OUTPUT"
          echo "tag_branch=${TAG_BRANCH}"   >> "$GITHUB_OUTPUT"

  # ── Build each arch natively in parallel ──────────────────────────────────
  build:
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: mvlchain-runner-large
          # arm64 temporarily disabled — QEMU emulation too slow (>1hr); re-enable when native arm64 runner is available
          # - platform: linux/arm64
          #   arch: arm64
          #   runner: mvlchain-runner-large

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: ${{ env.ECR_ACCOUNT_ID }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.prod
          platforms: ${{ matrix.platform }}
          push: true
          # Push to a digest-only tag; merged into final manifest in next job
          tags: ${{ needs.prepare.outputs.image_base }}:${{ matrix.arch }}-${{ needs.prepare.outputs.short_sha }}
          # Per-arch cache scope — each arch gets its own cache, no cross-busting
          cache-from: type=gha,scope=valhalla-${{ matrix.arch }}
          cache-to:   type=gha,mode=max,scope=valhalla-${{ matrix.arch }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.ref.name=${{ needs.prepare.outputs.branch }}

  # ── Merge arch images into a single multi-arch manifest ───────────────────
  merge:
    needs: [prepare, build]
    runs-on: mvlchain-runner-large
    steps:
      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: ${{ env.ECR_ACCOUNT_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push multi-arch manifest
        run: |
          IMAGE_BASE="${{ needs.prepare.outputs.image_base }}"
          SHORT_SHA="${{ needs.prepare.outputs.short_sha }}"

          # Pull the per-arch images built above
          AMD64="${IMAGE_BASE}:amd64-${SHORT_SHA}"
          ARM64="${IMAGE_BASE}:arm64-${SHORT_SHA}"

          # Only include arch images that were actually built and pushed
          SOURCES=""
          if docker buildx imagetools inspect "${AMD64}" &>/dev/null; then
            SOURCES="${SOURCES} ${AMD64}"
            echo "✅ amd64 image found: ${AMD64}"
          else
            echo "⚠️  amd64 image not found, skipping"
          fi
          if docker buildx imagetools inspect "${ARM64}" &>/dev/null; then
            SOURCES="${SOURCES} ${ARM64}"
            echo "✅ arm64 image found: ${ARM64}"
          else
            echo "⚠️  arm64 image not found, skipping"
          fi

          if [ -z "${SOURCES}" ]; then
            echo "❌ No arch images found — cannot create manifest" && exit 1
          fi

          # Push all final tags as multi-arch manifests
          IFS=',' read -ra TAGS <<< "${{ needs.prepare.outputs.tags }}"
          for TAG in "${TAGS[@]}"; do
            docker buildx imagetools create -t "${TAG}" ${SOURCES}
          done

      - name: Verify image — JAR and native libs present
        run: |
          IMAGE="${{ needs.prepare.outputs.tag_sha }}"
          docker pull "${IMAGE}"

          echo "--- Verifying JAR exists ---"
          docker run --rm "${IMAGE}" sh -c "ls -lh /app/valhalla-jni.jar"

          echo "--- Verifying native libs bundled in JAR ---"
          docker run --rm "${IMAGE}" sh -c "jar tf /app/valhalla-jni.jar | grep '\.so'"

      - name: Summary
        run: |
          echo "## Valhalla Image Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | \`${{ needs.prepare.outputs.branch }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ needs.prepare.outputs.short_sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Registry | \`${{ env.ECR_REGISTRY }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Repository | \`${{ env.ECR_REPOSITORY }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dockerfile | \`docker/Dockerfile.prod\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Tags pushed:**" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ needs.prepare.outputs.tags }}" | tr ',' '\n' >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**To use this image for JNI JAR extraction:**" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`bash" >> "$GITHUB_STEP_SUMMARY"
          echo "docker run --rm -v \$(pwd)/output:/out \\" >> "$GITHUB_STEP_SUMMARY"
          echo "  ${{ needs.prepare.outputs.tag_sha }} \\" >> "$GITHUB_STEP_SUMMARY"
          echo "  sh -c 'cp /app/valhalla-jni.jar /out/'" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**To use this image for tile building:**" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`bash" >> "$GITHUB_STEP_SUMMARY"
          echo "VALHALLA_DOCKER_IMAGE=${{ needs.prepare.outputs.tag_sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
