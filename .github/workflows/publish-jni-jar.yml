name: Publish JNI JAR

# Triggered automatically after Build valhalla Image succeeds,
# or manually via workflow_dispatch.
#
# Branch strategy (mirrors CircleCI tada-spring-common):
#   dist        → release version  (no -SNAPSHOT suffix), publishes + creates git tag
#   master      → SNAPSHOT
#   development → SNAPSHOT

on:
  workflow_run:
    workflows: ["Build valhalla Image"]
    types: [completed]
    branches: [master, development, dist]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Full ECR image tag to extract JAR from (e.g. development-abc1234). Leave blank to use branch-latest."
        required: false
        default: ""

concurrency:
  group: publish-jni-jar-${{ github.ref }}
  cancel-in-progress: false   # never cancel a publish mid-run

env:
  ECR_ACCOUNT_ID: "633107344074"
  ECR_REGISTRY: 633107344074.dkr.ecr.ap-southeast-1.amazonaws.com
  ECR_REPOSITORY: valhalla
  AWS_REGION: ap-southeast-1
  GRADLE_DIR: src/bindings/java

jobs:
  publish:
    # For workflow_run: only proceed if the upstream build succeeded
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    runs-on: mvlchain-runner-large

    steps:
      # ── 1. Checkout (needed for gradlew + build.gradle.kts) ─────────────────
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Resolve branch name ───────────────────────────────────────────────
      # workflow_run does not set GITHUB_REF_NAME to the triggering branch,
      # so we derive it explicitly.
      - name: Resolve branch name
        id: branch
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            BRANCH="${{ github.event.workflow_run.head_branch }}"
          else
            BRANCH="${GITHUB_REF_NAME}"
          fi
          BRANCH_SAFE=$(echo "${BRANCH}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          echo "name=${BRANCH}"       >> "$GITHUB_OUTPUT"
          echo "safe=${BRANCH_SAFE}"  >> "$GITHUB_OUTPUT"

      # ── 3. Resolve version (mirrors CircleCI: dist → release, else SNAPSHOT) ─
      - name: Resolve publish version
        id: version
        run: |
          BRANCH="${{ steps.branch.outputs.name }}"
          RAW_VERSION=$(grep -E '^version\s*=\s*findProperty' ${{ env.GRADLE_DIR }}/build.gradle.kts \
            | grep -oP '"\K[^"]+(?="\s*\?\?)')
          # Fallback: read the hardcoded default string
          if [[ -z "${RAW_VERSION}" ]]; then
            RAW_VERSION=$(grep -E '"\d+\.\d+\.\d+' ${{ env.GRADLE_DIR }}/build.gradle.kts \
              | grep -oP '"\K[0-9]+\.[0-9]+\.[0-9]+(?=-SNAPSHOT)?' | head -1)
          fi
          BASE_VERSION="${RAW_VERSION%%-SNAPSHOT}"  # strip any existing -SNAPSHOT

          if [[ "${BRANCH}" == dist* ]]; then
            PUBLISH_VERSION="${BASE_VERSION}"
            IS_RELEASE=true
          else
            PUBLISH_VERSION="${BASE_VERSION}-SNAPSHOT"
            IS_RELEASE=false
          fi

          echo "base=${BASE_VERSION}"             >> "$GITHUB_OUTPUT"
          echo "publish=${PUBLISH_VERSION}"       >> "$GITHUB_OUTPUT"
          echo "is_release=${IS_RELEASE}"         >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${PUBLISH_VERSION} (release=${IS_RELEASE})"

      # ── 4. Determine ECR image tag to pull ───────────────────────────────────
      - name: Resolve image tag
        id: image
        run: |
          if [[ -n "${{ github.event.inputs.image_tag }}" ]]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            BRANCH_SAFE="${{ steps.branch.outputs.safe }}"
            TAG="${BRANCH_SAFE}-latest"
          fi
          FULL_IMAGE="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${TAG}"
          echo "tag=${TAG}"           >> "$GITHUB_OUTPUT"
          echo "full=${FULL_IMAGE}"   >> "$GITHUB_OUTPUT"
          echo "Pulling image: ${FULL_IMAGE}"

      # ── 5. Authenticate to ECR ───────────────────────────────────────────────
      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: ${{ env.ECR_ACCOUNT_ID }}

      # ── 6. Extract JAR from the Docker image ─────────────────────────────────
      - name: Extract JAR from image
        run: |
          IMAGE="${{ steps.image.outputs.full }}"
          docker pull "${IMAGE}"

          # Copy the JAR out of the image without starting a long-lived container
          CONTAINER_ID=$(docker create "${IMAGE}")
          mkdir -p /tmp/jni-jar
          docker cp "${CONTAINER_ID}:/app/valhalla-jni.jar" /tmp/jni-jar/valhalla-jni.jar
          docker rm "${CONTAINER_ID}"

          SIZE=$(stat -c%s /tmp/jni-jar/valhalla-jni.jar)
          if [[ "${SIZE}" -lt 1048576 ]]; then
            echo "❌ Extracted JAR is suspiciously small (${SIZE} bytes)" && exit 1
          fi
          echo "✅ JAR extracted: ${SIZE} bytes"

      # ── 7. Set up JDK for Gradle ─────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 8. Publish JAR to GitHub Packages ────────────────────────────────────
      # Mirrors CircleCI: REPO_POSTFIX="" for dist, "-snapshot" for others.
      # Skips buildNative and test — JAR came from the verified Docker image.
      - name: Publish to GitHub Packages
        working-directory: ${{ env.GRADLE_DIR }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.actor }}
          REPO_POSTFIX: ${{ steps.version.outputs.is_release == 'true' && '' || '-snapshot' }}
        run: |
          echo "Branch:      ${{ steps.branch.outputs.name }}"
          echo "Version:     ${{ steps.version.outputs.publish }}"
          echo "REPO_POSTFIX: ${REPO_POSTFIX}"

          chmod +x gradlew

          ./gradlew publish \
            -x buildNative \
            -x test \
            --no-daemon

      # ── 9. Create and push git tag (release branches only) ───────────────────
      - name: Create and push git tag
        if: steps.version.outputs.is_release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.base }}"
          TAG="v${VERSION}"
          echo "Target tag: ${TAG}"

          git config user.email "github-actions@github.com"
          git config user.name  "GitHub Actions"
          git remote set-url origin "https://${GITHUB_TOKEN}@github.com/easi6dev/valhalla.git"

          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "Tag ${TAG} already exists on origin. Skipping."
          else
            echo "Creating and pushing tag ${TAG}..."
            git tag "${TAG}"
            git push origin "${TAG}"
            echo "✅ Pushed tag ${TAG}"
          fi

      # ── 10. Summary ──────────────────────────────────────────────────────────
      - name: Summary
        run: |
          echo "## JNI JAR Publish Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | \`${{ steps.branch.outputs.name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${{ steps.version.outputs.publish }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Release | \`${{ steps.version.outputs.is_release }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Source image | \`${{ steps.image.outputs.full }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Published to | \`https://maven.pkg.github.com/easi6dev/valhalla\` |" >> "$GITHUB_STEP_SUMMARY"
