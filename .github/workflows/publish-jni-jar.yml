name: Publish JNI JAR

# Triggered automatically after Build valhalla Image succeeds,
# or manually via workflow_dispatch.
#
# Branch strategy:
#   dist     -> release  (artifactId: valhalla-jni, version: 1.0.0)
#   snapshot -> snapshot (artifactId: valhalla-jni, version: 1.0.0-SNAPSHOT)
#
# Note: workflow_dispatch from any other branch falls back to snapshot routing.
#
# Publishing strategy:
#   The .so files are gitignored (they are large binary artifacts built inside
#   Docker). We pull the pre-built Docker image, extract the bundled JAR that
#   was verified by the build-valhalla-image workflow, unpack the .so files from
#   it into the Gradle resources directory, then run ./gradlew publish.
#   This ensures the published artifact matches what was built and tested in
#   Docker, while using the same Gradle publish mechanism as tada-spring-common.

on:
  workflow_run:
    workflows: ["Build valhalla Image"]
    types: [completed]
    # NOTE: No 'branches' filter here intentionally.
    # GitHub's workflow_run 'branches' filter is evaluated against the default
    # branch and is unreliable — it silently drops triggers without any error.
    # Branch restriction is enforced explicitly in the job-level 'if' condition
    # below, checking github.event.workflow_run.head_branch at runtime instead.
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Full ECR image tag to extract JAR from (e.g. snapshot-abc1234). Leave blank to use branch-latest."
        required: false
        default: ""

concurrency:
  group: publish-jni-jar-${{ github.ref }}
  cancel-in-progress: false   # never cancel a publish mid-run

env:
  ECR_ACCOUNT_ID: "633107344074"
  ECR_REGISTRY: 633107344074.dkr.ecr.ap-southeast-1.amazonaws.com
  ECR_REPOSITORY: valhalla
  AWS_REGION: ap-southeast-1
  GRADLE_DIR: src/bindings/java
  # Path inside the Docker image where the bundled JAR lives (set by Dockerfile.prod)
  DOCKER_JAR_PATH: /app/valhalla-jni.jar
  # Resource directory where Gradle's processResources picks up native libs
  NATIVE_RESOURCES_DIR: src/bindings/java/src/main/resources/lib/linux-amd64

jobs:
  publish:
    # Allow manual triggers (workflow_dispatch) from any branch.
    # For automatic triggers (workflow_run): only proceed when:
    #   1. The upstream Build valhalla Image workflow succeeded, AND
    #   2. It ran on 'snapshot' or a 'dist*' branch.
    # Branch check is done here (not in the trigger's 'branches' filter) because
    # GitHub's workflow_run 'branches' filter is evaluated against the default
    # branch and silently drops events — runtime 'if' is the reliable alternative.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       (github.event.workflow_run.head_branch == 'snapshot' ||
        startsWith(github.event.workflow_run.head_branch, 'dist')))

    runs-on: mvlchain-runner-large

    steps:
      # -- 1. Checkout ----------------------------------------------------------
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -- 2. Resolve branch name -----------------------------------------------
      # workflow_run does not set GITHUB_REF_NAME to the triggering branch,
      # so we derive it explicitly.
      - name: Resolve branch name
        id: branch
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            BRANCH="${{ github.event.workflow_run.head_branch }}"
          else
            BRANCH="${GITHUB_REF_NAME}"
          fi
          BRANCH_SAFE=$(echo "${BRANCH}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          echo "name=${BRANCH}"       >> "$GITHUB_OUTPUT"
          echo "safe=${BRANCH_SAFE}"  >> "$GITHUB_OUTPUT"

      # -- 3. Resolve publish metadata ------------------------------------------
      # artifactId is always valhalla-jni (consistent single name).
      # Version carries the channel signal:
      #   dist branches  -> X.Y.Z        (release)
      #   other branches -> X.Y.Z-SNAPSHOT
      - name: Resolve publish metadata
        id: meta
        run: |
          BRANCH="${{ steps.branch.outputs.name }}"

          # Read base version from gradle.properties (single source of truth).
          # Strip -SNAPSHOT suffix if present, then re-add based on branch.
          BASE_VERSION=$(grep -oP '^version=\K\S+' ${{ env.GRADLE_DIR }}/gradle.properties | sed 's/-SNAPSHOT//' | head -1)
          if [[ -z "${BASE_VERSION}" ]]; then
            echo "ERROR: Could not extract version from gradle.properties" && exit 1
          fi

          if [[ "${BRANCH}" == dist* ]]; then
            VERSION="${BASE_VERSION}"
          else
            VERSION="${BASE_VERSION}-SNAPSHOT"
          fi

          echo "artifact_id=valhalla-jni"  >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}"         >> "$GITHUB_OUTPUT"
          echo "Resolved: valhalla-jni:${VERSION} (branch=${BRANCH})"

      # -- 4. Resolve ECR image tag ---------------------------------------------
      - name: Resolve image tag
        id: image
        run: |
          if [[ -n "${{ github.event.inputs.image_tag }}" ]]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            BRANCH_SAFE="${{ steps.branch.outputs.safe }}"
            TAG="${BRANCH_SAFE}-latest"
          fi
          FULL_IMAGE="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${TAG}"
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "full=${FULL_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "Pulling image: ${FULL_IMAGE}"

      # -- 5. Authenticate to ECR -----------------------------------------------
      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: ${{ env.ECR_ACCOUNT_ID }}

      # -- 6. Extract .so files from the verified Docker image ------------------
      # The Docker image was built and verified by the build-valhalla-image
      # workflow. The JAR at /app/valhalla-jni.jar already contains all .so files
      # bundled as resources. We unzip them into the Gradle resources directory so
      # that ./gradlew publish packages the same native libs that were tested.
      # We also place libvalhalla_jni.so at the path buildNative outputs to so
      # that the onlyIf guard fires and the CMake step is skipped.
      - name: Extract native libs from Docker image
        run: |
          IMAGE="${{ steps.image.outputs.full }}"
          docker pull "${IMAGE}"

          CONTAINER_ID=$(docker create "${IMAGE}")

          # Extract the verified JAR
          mkdir -p /tmp/jni-jar
          docker cp "${CONTAINER_ID}:${{ env.DOCKER_JAR_PATH }}" /tmp/jni-jar/valhalla-jni.jar
          docker rm "${CONTAINER_ID}"

          # Validate JAR size
          SIZE=$(stat -c%s /tmp/jni-jar/valhalla-jni.jar)
          if [[ "${SIZE}" -lt 1048576 ]]; then
            echo "❌ Extracted JAR is suspiciously small (${SIZE} bytes)" && exit 1
          fi
          echo "✅ JAR extracted: ${SIZE} bytes"

          # Unpack .so files from the JAR into the Gradle resources directory
          # so processResources bundles them into the published JAR
          mkdir -p "${{ env.NATIVE_RESOURCES_DIR }}"
          unzip -o /tmp/jni-jar/valhalla-jni.jar 'lib/linux-amd64/*.so*' -d /tmp/jni-unpack
          cp /tmp/jni-unpack/lib/linux-amd64/*.so* "${{ env.NATIVE_RESOURCES_DIR }}/"
          echo "✅ Native libs extracted to ${{ env.NATIVE_RESOURCES_DIR }}:"
          ls -lh "${{ env.NATIVE_RESOURCES_DIR }}"

          # Place libvalhalla_jni.so at the buildNative output path so the
          # onlyIf guard evaluates to true and CMake is skipped entirely
          NATIVE_BUILD_DIR="${{ env.GRADLE_DIR }}/build/libs/native/Release"
          mkdir -p "${NATIVE_BUILD_DIR}"
          cp "${{ env.NATIVE_RESOURCES_DIR }}/libvalhalla_jni.so" "${NATIVE_BUILD_DIR}/libvalhalla_jni.so"
          echo "✅ libvalhalla_jni.so placed at ${NATIVE_BUILD_DIR} (skips buildNative CMake)"

      # -- 7. Set up JDK 17 -----------------------------------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # -- 8. Publish to GitHub Packages via Gradle (mirrors tada-spring-common) -
      # Pass -Pversion to override gradle.properties at publish time so dist
      # branches publish as X.Y.Z and snapshot branches as X.Y.Z-SNAPSHOT.
      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.actor }}
        working-directory: ${{ env.GRADLE_DIR }}
        run: |
          echo "Branch    : ${{ steps.branch.outputs.name }}"
          echo "ArtifactId: ${{ steps.meta.outputs.artifact_id }}"
          echo "Version   : ${{ steps.meta.outputs.version }}"

          chmod +x gradlew
          ./gradlew --no-daemon publish -Pversion="${{ steps.meta.outputs.version }}"

      # -- 9. Create and push git tag (dist branches only) ----------------------
      - name: Create and push git tag
        if: startsWith(steps.branch.outputs.name, 'dist')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          TAG="v${VERSION}"
          echo "Target tag: ${TAG}"

          git config user.email "github-actions@github.com"
          git config user.name  "GitHub Actions"
          git remote set-url origin "https://${GITHUB_TOKEN}@github.com/easi6dev/valhalla.git"

          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "Tag ${TAG} already exists on origin. Skipping."
          else
            git tag "${TAG}" 2>/dev/null || echo "Local tag ${TAG} already exists, skipping local creation"
            git push origin "${TAG}"
            echo "✅ Pushed tag ${TAG}"
          fi

      # -- 10. Summary ----------------------------------------------------------
      - name: Summary
        run: |
          echo "## JNI JAR Publish Summary"                                                              >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                                         >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |"                                                                        >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|"                                                                         >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | \`${{ steps.branch.outputs.name }}\` |"                                      >> "$GITHUB_STEP_SUMMARY"
          echo "| ArtifactId | \`${{ steps.meta.outputs.artifact_id }}\` |"                             >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${{ steps.meta.outputs.version }}\` |"                                    >> "$GITHUB_STEP_SUMMARY"
          echo "| Source image | \`${{ steps.image.outputs.full }}\` |"                                 >> "$GITHUB_STEP_SUMMARY"
          echo "| Publish method | \`./gradlew publish\` (native libs from Docker) |"                   >> "$GITHUB_STEP_SUMMARY"
          echo "| Published to | \`https://maven.pkg.github.com/easi6dev/valhalla\` |"                  >> "$GITHUB_STEP_SUMMARY"
