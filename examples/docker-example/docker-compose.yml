version: '3.8'

services:
  valhalla-routing:
    build:
      context: ../..
      dockerfile: examples/docker-example/Dockerfile
    image: valhalla-routing-service:latest
    container_name: valhalla-routing
    environment:
      - VALHALLA_TILES_DIR=/tiles
      - JAVA_OPTS=-Xmx2g -Xms512m
    volumes:
      # Mount tiles as read-only
      - /path/to/tiles/singapore:/tiles:ro
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "java", "-cp", "/app/routing-service.jar", "HealthCheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

# For multiple regions
  valhalla-singapore:
    extends: valhalla-routing
    container_name: valhalla-singapore
    environment:
      - VALHALLA_TILES_DIR=/tiles
    volumes:
      - /path/to/tiles/singapore:/tiles:ro
    ports:
      - "8081:8080"

  valhalla-thailand:
    extends: valhalla-routing
    container_name: valhalla-thailand
    environment:
      - VALHALLA_TILES_DIR=/tiles
    volumes:
      - /path/to/tiles/thailand:/tiles:ro
    ports:
      - "8082:8080"
