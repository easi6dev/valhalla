# =============================================================================
# Dev Environment Pipeline Configuration
# =============================================================================
# Used by dev servers / shared dev environment (not local machines).
# NOT committed to git.
# =============================================================================

VALHALLA_ENV=dev

# Paths — dev server local disk (no EFS on dev)
VALHALLA_TILE_DIR=/var/valhalla/tiles
OSM_DIR=/var/valhalla/osm
VALHALLA_ADMIN_DIR=/var/valhalla/admin
VALHALLA_LOG_DIR=/var/log/valhalla

# Build options — elevation skipped for faster builds on dev
SKIP_ELEVATION=true
CLEAN_BUILD=false

# S3 — set to your dev bucket, or leave blank to skip
# S3_TILE_BUCKET=s3://<base-path>/tiles
S3_TILE_BUCKET=s3://tada-dev-valhalla-tiles
S3_REGION=ap-southeast-1

# Use Docker (no binary on dev servers)
# Image is built from source via GitHub Actions (.github/workflows/build-valhalla-image.yml).
# Update the tag below after each CI build on the development branch:
#   633107344074.dkr.ecr.ap-southeast-1.amazonaws.com/valhalla:development-<sha>
VALHALLA_BUILD_TILES_BIN=
VALHALLA_DOCKER_IMAGE=633107344074.dkr.ecr.ap-southeast-1.amazonaws.com/valhalla:development
