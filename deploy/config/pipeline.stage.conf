# =============================================================================
# Staging Pipeline Configuration
# =============================================================================
# NOT committed to git — managed via secrets manager (AWS SSM, Vault, etc.)
# in CI/CD. Fill in the EFS mount point and S3 bucket before deploying.
# =============================================================================

VALHALLA_ENV=staging

# Paths — EFS mount (shared across all app instances and the builder)
# Mount EFS at /mnt/efs before running the pipeline.
# EFS access point: /valhalla_tiles (read-write for builder, read-only for app)
VALHALLA_TILE_DIR=/mnt/efs/valhalla_tiles
OSM_DIR=/mnt/efs/valhalla_osm
VALHALLA_ADMIN_DIR=/mnt/efs/valhalla_admin
VALHALLA_LOG_DIR=/var/log/valhalla

# Build options — elevation skipped on staging for faster weekly rebuilds
SKIP_ELEVATION=true
CLEAN_BUILD=false

# S3 — staging archive bucket (fill in your bucket name)
# S3_TILE_BUCKET=s3://<base-path>/tiles
S3_TILE_BUCKET=
S3_REGION=ap-southeast-1

# Use Docker on CI builder
VALHALLA_BUILD_TILES_BIN=
VALHALLA_DOCKER_IMAGE=ghcr.io/valhalla/valhalla:latest
