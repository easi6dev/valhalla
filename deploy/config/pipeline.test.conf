# =============================================================================
# Test Environment Pipeline Configuration
# =============================================================================
# Used by CI test runs and automated test pipelines.
# NOT committed to git.
# =============================================================================

VALHALLA_ENV=test

# Paths — ephemeral temp dirs in CI (overridden by CI env vars if needed)
VALHALLA_TILE_DIR=/tmp/valhalla/tiles
OSM_DIR=/tmp/valhalla/osm
VALHALLA_ADMIN_DIR=/tmp/valhalla/admin
VALHALLA_LOG_DIR=/tmp/valhalla/logs

# Build options — skip elevation and always clean for reproducible test runs
SKIP_ELEVATION=true
CLEAN_BUILD=true

# S3_TILE_BUCKET=s3://<base-path>/tiles
S3_TILE_BUCKET=
S3_REGION=ap-southeast-1

# Use Docker
VALHALLA_BUILD_TILES_BIN=
VALHALLA_DOCKER_IMAGE=ghcr.io/valhalla/valhalla:latest
