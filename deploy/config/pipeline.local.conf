# =============================================================================
# Local Dev Pipeline Configuration
# =============================================================================
# NOT committed to git — copy pipeline.conf.example to get started.
# =============================================================================

VALHALLA_ENV=local

# Paths — relative paths resolve from project root when running scripts from WSL2.
# Override with absolute paths if needed:
#   VALHALLA_TILE_DIR=/mnt/c/Users/<user>/Workspace/valhalla/data/valhalla_tiles
VALHALLA_TILE_DIR=data/valhalla_tiles
OSM_DIR=data/osm
VALHALLA_ADMIN_DIR=data/admin_data
VALHALLA_LOG_DIR=logs

# Build options — elevation skipped for faster local iteration
SKIP_ELEVATION=true
CLEAN_BUILD=false

# S3 — disabled locally
S3_TILE_BUCKET=
S3_REGION=ap-southeast-1

# Binary built from source (set to blank to use Docker instead)
# VALHALLA_BUILD_TILES_BIN=/mnt/c/Users/<user>/Workspace/valhalla/build/src/valhalla_build_tiles
VALHALLA_BUILD_TILES_BIN=
VALHALLA_DOCKER_IMAGE=valhalla:local
