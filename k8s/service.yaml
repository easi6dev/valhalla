# ============================================
# Kubernetes Service for Valhalla JNI
# ============================================
apiVersion: v1
kind: Service
metadata:
  name: valhalla-jni
  namespace: valhalla
  labels:
    app: valhalla-jni
    component: routing
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP  # Use LoadBalancer for external access
  sessionAffinity: None
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: valhalla-jni

---
# Headless service (for StatefulSet or direct pod access)
apiVersion: v1
kind: Service
metadata:
  name: valhalla-jni-headless
  namespace: valhalla
  labels:
    app: valhalla-jni
    component: routing
spec:
  clusterIP: None  # Headless
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: valhalla-jni
